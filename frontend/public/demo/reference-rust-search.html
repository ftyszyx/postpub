      <h1>Rust 检索链路参考</h1>
      <p>postpub 的 AIForge 替代实现优先保证可维护性和部署一致性，因此检索部分直接放在 Rust 核心中完成。</p>
      <p>搜索模式下，系统会先获取新闻结果，再把标题、链接、摘要统一整理成共享结构，交给生成模块继续处理。</p>
      <p>这样做的重点不是做一个很花哨的搜索页面，而是让桌面端和 Web 端共享同一条后端数据管线。</p>
    </article>
